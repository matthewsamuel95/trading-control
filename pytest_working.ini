[tool:pytest]
testpaths = tests
python_files = test_basic.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --ignore=venv
    --ignore=**/venv/**
    --ignore=**/site-packages/**
    --ignore=test_api.py
    --ignore=test_orchestrator.py
    --ignore=test_tools.py
    --ignore=tests/test_api.py
    --ignore=tests/test_orchestrator.py
    --ignore=tests/test_tools.py
    --ignore=test_utils.py
    --ignore=tests/test_utils.py
    --ignore=test_memory.py
    --ignore=tests/test_memory.py
    --ignore=test_clean_architecture.py
    --ignore=tests/test_clean_architecture.py
    --ignore=test_config.py
    --ignore=tests/test_config.py
    --ignore=test_logger.py
    --ignore=tests/test_logger.py
    --ignore=test_tasks.py
    --ignore=tests/test_tasks.py
    --cov=.
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
    --cov-fail-under=80

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
