[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    venv,
    .tox,
    .eggs,
    *.egg

# Error codes to focus on:
# E9: Syntax errors (undefined names, etc.)
# F63: True/False comparisons
# F7: Loop control
# F82: Undefined names in comprehensions
select = E9,F63,F7,F82
