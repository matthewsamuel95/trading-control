 name: PR Review Automation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  issues: write
  checks: write
  statuses: write

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety ruff

    - name: Security scan with Bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f txt -o bandit-report.txt || true

    - name: Security check with Safety
      run: |
        safety check --json --output safety-report.json || true
        safety check --output safety-report.txt || true

    - name: Code quality with Ruff
      run: |
        ruff check . --output-format=json > ruff-report.json || true
        ruff check . --output-format=text > ruff-report.txt || true

    - name: Complexity analysis
      run: |
        pip install radon
        radon cc . --json > complexity-report.json || true
        radon cc . --txt > complexity-report.txt || true

    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          bandit-report.json
          bandit-report.txt
          safety-report.json
          safety-report.txt
          ruff-report.json
          ruff-report.txt
          complexity-report.json
          complexity-report.txt

  pr-comment:
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download reports
      uses: actions/download-artifact@v4
      with:
        name: code-quality-reports

    - name: Comment PR with results
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read reports if they exist
          let ruffReport = '';
          let banditReport = '';
          let safetyReport = '';
          
          try {
            ruffReport = fs.readFileSync('ruff-report.txt', 'utf8');
          } catch (e) {}
          
          try {
            banditReport = fs.readFileSync('bandit-report.txt', 'utf8');
          } catch (e) {}
          
          try {
            safetyReport = fs.readFileSync('safety-report.txt', 'utf8');
          } catch (e) {}
          
          const comment = `
          ## 🔍 Code Quality Review
          
          ### 📊 Ruff Analysis
          \`\`\`
          ${ruffReport.split('\n').slice(0, 10).join('\n')}
          \`\`\`
          
          ### 🔒 Security Scan
          **Bandit:**
          \`\`\`
          ${banditReport.split('\n').slice(0, 10).join('\n')}
          \`\`\`
          
          **Safety:**
          \`\`\`
          ${safetyReport.split('\n').slice(0, 10).join('\n')}
          \`\`\`
          
          ---
          🤖 *Generated by automated PR review*
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
